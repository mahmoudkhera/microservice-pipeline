name: Build & Push with Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image version (tag)"
        required: true
        default: "latest"

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      inventory: ${{ steps.filter.outputs.inventory }}
      notification: ${{ steps.filter.outputs.notification }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base:  HEAD~1
          filters: |
            frontend:
              - 'frontend/**'
            inventory:
              - 'inventory-service/**'
            notification:
              - 'notification-service/**'
  vulnerability-scanning:
      needs: detect-changes
      runs-on: ubuntu-latest
      strategy:
        matrix:
          service: [frontend, inventory-service, notification-service]
      
      steps:
        - uses: actions/checkout@v4
        
        
        - name: Scan ${{ matrix.service }}
          if: |
            (matrix.service == 'frontend' && needs.detect-changes.outputs.frontend == 'true') ||
            (matrix.service == 'inventory-service' && needs.detect-changes.outputs.inventory == 'true') ||
            (matrix.service == 'notification-service' && needs.detect-changes.outputs.notification == 'true')
          uses: sonarsource/sonarqube-scan-action@master
          with:
            projectBaseDir: ${{ matrix.service }}
            args: >
              -Dsonar.organization=mahmoudkhera
              -Dsonar.projectKey=mahmoudkhera_${{ matrix.service }}
              -Dsonar.sources=.
              -Dsonar.host.url=https://sonarcloud.io
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  
  build-frontend:
    needs: [detect-changes, vulnerability-scanning]
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops2-frontend:${{ inputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-frontend:buildcache,mode=max

  build-backend:
    needs: [detect-changes, vulnerability-scanning]
    if: ${{ needs.detect-changes.outputs.inventory == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./inventory-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops2-backend:${{ inputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-backend:buildcache,mode=max
  build-notifications:
    needs: [detect-changes, vulnerability-scanning]
    if: ${{ needs.detect-changes.outputs.notification == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops2-notifications:${{ inputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-notifications:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-notifications:buildcache,mode=max
  integration-test:
      name: Integration Test
      runs-on: ubuntu-latest
      environment: 'dev-env'
      needs: [build-frontend, build-backend, build-notifications]
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        VERSION: ${{ inputs.version }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SMTP_HOST: ${{ vars.SMTP_HOST }}
        SMTP_PORT: ${{ vars.SMTP_PORT }}
        SMTP_FROM: ${{ vars.SMTP_FROM }}
        ALERT_RECIPIENT: ${{ vars.ALERT_RECIPIENT }}
  
      steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Debug env variables
          run: |
            echo "DOCKER_USERNAME=$DOCKER_USERNAME"
            echo "VERSION=$VERSION"
            echo "SMTP_HOST=$SMTP_HOST"
            echo "SMTP_PORT=$SMTP_PORT"
        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASS }}
  
        - name: Pull images
          run: |
            docker pull ${DOCKER_USERNAME}/devops2-frontend:${VERSION}
            docker pull ${DOCKER_USERNAME}/devops2-backend:${VERSION}
            docker pull ${DOCKER_USERNAME}/devops2-notifications:${VERSION}
  
        - name: Start services with docker compose
          run: docker compose -f tests/docker-compose.yaml up -d
  
        - name: Wait for services to be ready
          run: |
           echo "Waiting for services..."
           for i in {1..20}; do
              BACKEND=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || true)
              NOITICATION=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3002/health || true)
              FRONTEND=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ || true)
        
              echo "Attempt $i:"
              echo "  frontend: $FRONTEND"
              echo "  backend:  $BACKEND"
              echo "  notification: $NOITICATION"
        
              if [ "$FRONTEND" = "200" ] && [ "$BACKEND" = "200" ] && [ "$NOITICATION" = "200" ]; then
                echo " All services responding"
                break
              fi
        
              sleep 2
            done
  
        - name: Run integration tests
          run: bash ./tests/integration-tests.sh
  
        - name: Dump logs on failure        
          if: failure()
          run: |
            echo "═══ FRONTEND LOGS ═══"
            docker logs ci-frontend || true
            echo "═══ INVENTORY LOGS ═══"
            docker logs ci-inventory || true
            echo "═══ NOTIFICATION LOGS ═══"
            docker logs ci-notification || true  
  
        - name: Cleanup
          if: always()
          run: docker compose -f tests/docker-compose.yaml down -v 

