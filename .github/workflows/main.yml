name: Build & Push with Version

on:
  push:
    branches: [main]
  pull_request:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      inventory: ${{ steps.filter.outputs.inventory }}
      notification: ${{ steps.filter.outputs.notification }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            inventory:
              - 'inventory-service/**'
            notification:
              - 'notification-service/**'
  vulnerability-scanning:
      needs: detect-changes
      runs-on: ubuntu-latest
      strategy:
        matrix:
          service: [frontend, inventory-service, notification-service]
      
      steps:
        - uses: actions/checkout@v4
        
        
        - name: Scan ${{ matrix.service }}
          if: |
            (matrix.service == 'frontend' && needs.detect-changes.outputs.frontend == 'true') ||
            (matrix.service == 'inventory-service' && needs.detect-changes.outputs.inventory == 'true') ||
            (matrix.service == 'notification-service' && needs.detect-changes.outputs.notification == 'true')
          uses: sonarsource/sonarqube-scan-action@master
          with:
            projectBaseDir: ${{ matrix.service }}
            args: >
              -Dsonar.organization=mahmoudkhera
              -Dsonar.projectKey=mahmoudkhera_${{ matrix.service }}
              -Dsonar.sources=.
              -Dsonar.host.url=https://sonarcloud.io
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  
  build-frontend:
    needs: [detect-changes, vulnerability-scanning]
    if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    outputs:
     tag: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops2-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-frontend:buildcache,mode=max
     
      - name: Save SHA to cache
        run: echo "${{ github.sha }}" > frontend-sha.txt
      - name: Cache frontend SHA
        uses: actions/cache/save@v4
        with:
          path: frontend-sha.txt
          key: frontend-last-sha

  build-inventory:
    needs: [detect-changes, vulnerability-scanning]
    if: ${{ needs.detect-changes.outputs.inventory == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./inventory-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops2-inventory:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-backend:buildcache,mode=max
  
      - name: Save SHA to cache
        run: echo "${{ github.sha }}" > inventory-sha.txt
      - name: Cache frontend SHA
        uses: actions/cache/save@v4
        with:
          path: inventory-sha.txt
          key: inventory-last-sha
  
  
  build-notifications:
    needs: [detect-changes, vulnerability-scanning]
    if: ${{ needs.detect-changes.outputs.notification == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops2-notifications:${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-notifications:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-notifications:buildcache,mode=max
 
      - name: Save SHA to cache
        run: echo "${{ github.sha }}" > notifications-sha.txt
      - name: Cache frontend SHA
        uses: actions/cache/save@v4
        with:
          path: notifications-sha.txt
          key: notifications-last-sha
 
 
 
  integration-test:
      
      name: Integration Test
      needs: [detect-changes,build-frontend, build-inventory, build-notifications]
      if: |
            (needs.detect-changes.outputs.frontend == 'true') ||
            (needs.detect-changes.outputs.inventory == 'true') ||
            (needs.detect-changes.outputs.notification == 'true')
      runs-on: ubuntu-latest
      environment: 'dev-env'
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        VERSION: ${{ github.sha }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SMTP_HOST: ${{ vars.SMTP_HOST }}
        SMTP_PORT: ${{ vars.SMTP_PORT }}
        SMTP_FROM: ${{ vars.SMTP_FROM }}
        ALERT_RECIPIENT: ${{ vars.ALERT_RECIPIENT }}
  
      steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Debug env variables
          run: |
            echo "DOCKER_USERNAME=$DOCKER_USERNAME"
            echo "VERSION=$VERSION"
            echo "SMTP_HOST=$SMTP_HOST"
            echo "SMTP_PORT=$SMTP_PORT"
        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASS }}
    
        - name: Set image versions
          run: |
           # If service was just built this run, use current SHA
           # Otherwise read the last SHA that was successfully built from cache
            if [ "${{ needs.detect-changes.outputs.frontend }}" == "true" ]; then
                 FRONTEND_VERSION="${{ github.sha }}"
            else
                 FRONTEND_VERSION=$(cat frontend-sha.txt 2>/dev/null || echo "latest")
            fi

            if [ "${{ needs.detect-changes.outputs.inventory }}" == "true" ]; then
              BACKEND_VERSION="${{ github.sha }}"
            else
              BACKEND_VERSION=$(cat backend-sha.txt 2>/dev/null || echo "latest")
            fi

            if [ "${{ needs.detect-changes.outputs.notification }}" == "true" ]; then
               NOTIFICATION_VERSION="${{ github.sha }}"
            else
              NOTIFICATION_VERSION=$(cat notification-sha.txt 2>/dev/null || echo "latest")
            fi

            echo "FRONTEND_VERSION=$FRONTEND_VERSION"         >> $GITHUB_ENV
            echo "BACKEND_VERSION=$BACKEND_VERSION"           >> $GITHUB_ENV
            echo "NOTIFICATION_VERSION=$NOTIFICATION_VERSION" >> $GITHUB_ENV

            echo "Frontend  → $FRONTEND_VERSION"
            echo "Backend   → $BACKEND_VERSION"
            echo "Notification → $NOTIFICATION_VERSION"


        - name: Pull images
          run: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops2-frontend:${FRONTEND_VERSION}
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops2-backend:${BACKEND_VERSION}
            docker pull ${{ secrets.DOCKER_USERNAME }}/devops2-notifications:${NOTIFICATION_VERSION}
      
        - name: Start services with docker compose
          run: docker compose -f tests/docker-compose.yaml up -d
  
        - name: Wait for services to be ready
          run: |
           echo "Waiting for services..."
           for i in {1..20}; do
              inventory=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || true)
              NOITICATION=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3002/health || true)
              FRONTEND=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ || true)
        
              echo "Attempt $i:"
              echo "  frontend: $FRONTEND"
              echo "  inventory:  $inventory"
              echo "  notification: $NOITICATION"
        
              if [ "$FRONTEND" = "200" ] && [ "$inventory" = "200" ] && [ "$NOITICATION" = "200" ]; then
                echo " All services responding"
                break
              fi
        
              sleep 2
            done
  
        - name: Run integration tests
          run: bash ./tests/integration-tests.sh
  
        - name: Dump logs on failure        
          if: failure()
          run: |
            echo "═══ FRONTEND LOGS ═══"
            docker logs ci-frontend || true
            echo "═══ INVENTORY LOGS ═══"
            docker logs ci-inventory || true
            echo "═══ NOTIFICATION LOGS ═══"
            docker logs ci-notification || true  
  
        - name: Cleanup
          if: always()
          run: docker compose -f tests/docker-compose.yaml down -v 

