name: Build & Push with Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image version (tag)"
        required: true
        default: "latest"

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops2-frontend:${{ inputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-frontend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-frontend:buildcache,mode=max

  build-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./inventory-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops2-backend:${{ inputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-backend:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-backend:buildcache,mode=max
  build-notifications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: ./notification-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/devops2-notifications:${{ inputs.version }}
          cache-from: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-notifications:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKER_USERNAME }}/devops2-notifications:buildcache,mode=max
  integration-test:
      name: Integration Test
      runs-on: ubuntu-latest
      environment: dev-env
      needs: [build-frontend, build-backend, build-notifications]
      env:
        DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        VERSION: ${{ inputs.version }}
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        SMTP_USER: ${{ secrets.SMTP_USER }}
        SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        SMTP_HOST: ${{ vars.SMTP_HOST }}
        SMTP_PORT: ${{ vars.SMTP_PORT }}
        SMTP_FROM: ${{ vars.SMTP_FROM }}
        ALERT_RECIPIENT: ${{ vars.ALERT_RECIPIENT }}
  
      steps:
        - name: Checkout
          uses: actions/checkout@v4
        - name: Debug env variables
          run: |
            echo "DOCKER_USERNAME=$DOCKER_USERNAME"
            echo "VERSION=$VERSION"
            echo "SMTP_HOST=$SMTP_HOST"
            echo "SMTP_PORT=$SMTP_PORT"
        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASS }}
  
        - name: Pull images
          run: |
            docker pull ${DOCKER_USERNAME}/devops2-frontend:${VERSION}
            docker pull ${DOCKER_USERNAME}/devops2-backend:${VERSION}
            docker pull ${DOCKER_USERNAME}/devops2-notifications:${VERSION}
  
        - name: Start services with docker compose
          run: docker compose -f tests/docker-compose.yaml up -d
  
        - name: Wait for services to be ready
          run: |
           echo "Waiting for services..."
           for i in {1..20}; do
              BACKEND=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health || true)
              NOITICATION=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3002/health || true)
              FRONTEND=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ || true)
        
              echo "Attempt $i:"
              echo "  frontend: $FRONTEND"
              echo "  backend:  $BACKEND"
              echo "  notification: $NOITICATION"
        
              if [ "$FRONTEND" = "200" ] && [ "$BACKEND" = "200" ] && [ "$NOITICATION" = "200" ]; then
                echo " All services responding"
                break
              fi
        
              sleep 2
            done
  
        - name: Run integration tests
          run: bash ./tests/integration-tests.sh
  
        - name: Dump logs on failure        
          if: failure()
          run: |
            echo "═══ FRONTEND LOGS ═══"
            docker logs ci-frontend || true
            echo "═══ INVENTORY LOGS ═══"
            docker logs ci-inventory || true
            echo "═══ NOTIFICATION LOGS ═══"
            docker logs ci-notification || true  
  
        - name: Cleanup
          if: always()
          run: docker compose -f tests/docker-compose.yaml down -v 

