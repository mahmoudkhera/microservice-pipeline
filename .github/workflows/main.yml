name: Build & Push with Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Docker image version (tag)"
        required: true
        default: "latest"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME}}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build frontend service
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/devops2:${{ github.event.inputs.version }} ./frontend

      - name: Push image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/devops2:${{ github.event.inputs.version }}
